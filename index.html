<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Link WhatsApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #f03612;
            --primary-rgb: 240, 54, 18;
            --primary-dark: #cc2d0f;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(22, 22, 22, 0.7);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --white: #ffffff;
            --radius-lg: 32px;
            --radius-md: 16px;
        }

        h1, h2, h3, .btn-generate {
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(var(--primary-rgb), 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(var(--primary-rgb), 0.1) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .header {
            padding: 40px 30px 20px;
            text-align: center;
            position: relative;
        }

        .character-container {
            width: 180px;
            height: 180px;
            margin: -20px auto 10px;
            position: relative;
            z-index: 2;
        }

        .character-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .form-container {
            padding: 10px 30px 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group label span {
            opacity: 0.5;
            text-transform: none;
            letter-spacing: normal;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: var(--text-dim);
            transition: all 0.3s ease;
        }

        .input-wrapper:has(textarea) svg {
            top: 18px;
            transform: none;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 18px 16px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group textarea {
            resize: none;
            height: 120px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.15);
        }

        .form-group input:focus + svg,
        .form-group textarea:focus + svg {
            fill: var(--primary);
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(var(--primary-rgb), 0.3);
        }

        .btn-generate:hover {
            transform: translateY(-4px);
            background: var(--primary-dark);
            box-shadow: 0 15px 35px rgba(var(--primary-rgb), 0.5);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate svg {
            width: 22px;
            height: 22px;
            fill: var(--white);
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 24px;
            background: rgba(var(--primary-rgb), 0.1);
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            border-radius: var(--radius-md);
            animation: slideUp 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .result.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--primary);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-link {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #fff;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: monospace;
        }

        .result-actions {
            display: flex;
            gap: 12px;
        }

        .btn-copy,
        .btn-open {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-open {
            background: var(--white);
            color: var(--bg-dark);
        }

        .btn-open:hover {
            background: #eee;
            transform: scale(1.02);
        }

        .btn-copy svg,
        .btn-open svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary);
            color: var(--white);
            padding: 16px 28px;
            border-radius: 16px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            text-align: center;
            padding: 25px;
            background: rgba(0, 0, 0, 0.2);
        }

        .footer a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--primary);
        }

        /* Preview modernizado */
        .preview {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            display: none;
        }

        .preview.show {
            display: block;
        }

        .preview-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .preview-bubble {
            background: var(--primary);
            padding: 14px 18px;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            max-width: 90%;
            margin-left: auto;
            position: relative;
            box-shadow: 0 5px 15px rgba(var(--primary-rgb), 0.2);
        }

        .preview-bubble p {
            font-size: 0.95rem;
            color: white;
            line-height: 1.5;
        }

        .preview-bubble::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -8px;
            width: 15px;
            height: 15px;
            background: var(--primary);
            clip-path: polygon(0 0, 0% 100%, 100% 100%);
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="character-container">
                <img src="character.png" alt="Mascote Supply Sistemas">
            </div>
            <h1>WhatsApp Linker</h1>
            <p>Gere links rápidos com a identidade Supply</p>
        </div>

        <div class="form-container">
            <div class="form-group">
                <label>Número de telefone <span>(com DDI)</span></label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
                    </svg>
                    <input type="tel" id="phone" placeholder="5511999999999" maxlength="15">
                </div>
            </div>

            <div class="form-group">
                <label>Mensagem <span>(opcional)</span></label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" />
                    </svg>
                    <textarea id="message" placeholder="Olá! Gostaria de saber mais sobre..."></textarea>
                </div>
            </div>

            <button class="btn-generate" onclick="generateLink()">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                Gerar Link
            </button>

            <div class="preview" id="preview">
                <div class="preview-label">Pré-visualização</div>
                <div class="preview-bubble">
                    <p id="previewText">Sua mensagem aparecerá aqui...</p>
                </div>
            </div>

            <div class="result" id="result">
                <div class="result-label">Seu link está pronto!</div>
                <div class="result-link" id="resultLink"></div>
                <div class="result-actions">
                    <button class="btn-copy" onclick="copyLink()">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
                        </svg>
                        Copiar
                    </button>
                    <button class="btn-open" onclick="openLink()">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z" />
                        </svg>
                        Abrir
                    </button>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="#">Feito por SupplySistemas</a>
        </div>
    </div>

    <div class="toast" id="toast">Link copiado com sucesso!</div>

    <script>
        let generatedUrl = '';

        function generateLink() {
            const phone = document.getElementById('phone').value.replace(/\D/g, '');
            const message = document.getElementById('message').value.trim();

            if (!phone) {
                showToast('Por favor, digite um número de telefone!');
                return;
            }

            if (phone.length < 10) {
                showToast('Número de telefone inválido!');
                return;
            }

            // Criar URL do WhatsApp
            let url = `https://wa.me/${phone}`;

            if (message) {
                url += `?text=${encodeURIComponent(message)}`;
            }

            generatedUrl = url;

            // Mostrar resultado
            document.getElementById('resultLink').textContent = url;
            document.getElementById('result').classList.add('show');

            // Mostrar preview
            const preview = document.getElementById('preview');
            const previewText = document.getElementById('previewText');
            preview.classList.add('show');
            previewText.textContent = message || 'Olá! Gostaria de saber mais sobre...';
        }

        function copyLink() {
            if (!generatedUrl) return;

            navigator.clipboard.writeText(generatedUrl).then(() => {
                showToast('Link copiado com sucesso!');
            }).catch(() => {
                // Fallback para navegadores mais antigos
                const textarea = document.createElement('textarea');
                textarea.value = generatedUrl;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Link copiado com sucesso!');
            });
        }

        function openLink() {
            if (!generatedUrl) return;
            window.open(generatedUrl, '_blank');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Preview em tempo real
        document.getElementById('message').addEventListener('input', function () {
            const preview = document.getElementById('preview');
            const previewText = document.getElementById('previewText');

            if (this.value.trim()) {
                preview.classList.add('show');
                previewText.textContent = this.value;
            }
        });
    </script>
</body>

</html>
